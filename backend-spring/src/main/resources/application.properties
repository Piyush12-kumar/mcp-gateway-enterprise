spring.datasource.url=jdbc:mysql://localhost:3306/mcp_gateway?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=6395
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=8080

# Logging Configuration
logging.level.root=INFO
logging.level.com.mcpgateway=DEBUG
logging.file.name=backend-spring/application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Jackson Configuration
spring.jackson.serialization.indent-output=true

# JWT Configuration (override with env vars in production)
security.jwt.secret=${JWT_SECRET:change-me-in-prod-please-use-a-long-random-32B+-secret-value}
security.jwt.expiration-ms=86400000

# Actuator: expose health/info/metrics/prometheus (docker-compose healthcheck uses /actuator/health)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Feature flags (let the app boot without optional infrastructure)
features.redis.enabled=false
features.kafka.enabled=false

# Resilience4j Circuit Breaker configuration
resilience4j.circuitbreaker.instances.mcpServer.slidingWindowSize=10
resilience4j.circuitbreaker.instances.mcpServer.failureRateThreshold=50
resilience4j.circuitbreaker.instances.mcpServer.waitDurationInOpenState=30000
resilience4j.circuitbreaker.instances.mcpServer.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.mcpServer.automaticTransitionFromOpenToHalfOpenEnabled=true

# Resilience4j Retry configuration
resilience4j.retry.instances.mcpServer.maxAttempts=3
resilience4j.retry.instances.mcpServer.waitDuration=500ms
resilience4j.retry.instances.mcpServer.retryExceptions=java.io.IOException,java.net.ConnectException



# =============================================================================
# MCP Gateway - Kubernetes Namespace, ConfigMap, and Secrets
# =============================================================================
# Apply first: kubectl apply -f 00-namespace-config.yaml
# =============================================================================

---
# Namespace for all MCP Gateway resources
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-gateway
  labels:
    app: mcp-gateway
    environment: production

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-gateway-config
  namespace: mcp-gateway
  labels:
    app: mcp-gateway
data:
  # Application settings
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  
  # Database connection (host references the MySQL service)
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/mcp_gateway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  
  # JPA settings
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_SHOW_SQL: "false"
  
  # Rate limiting
  RATE_LIMIT_CALLS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  
  # Logging
  LOGGING_LEVEL_COM_MCPGATEWAY: "INFO"
  
  # Actuator endpoints for health checks
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
  
  # Feature flags (Redis/Kafka disabled by default in K8s basic setup)
  FEATURES_REDIS_ENABLED: "false"
  FEATURES_KAFKA_ENABLED: "false"

---
# Secret for sensitive configuration
# NOTE: In production, use Kubernetes Secrets with proper encryption or external secret managers
# Base64 encode values: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-secrets
  namespace: mcp-gateway
  labels:
    app: mcp-gateway
type: Opaque
data:
  # Database credentials (base64 encoded)
  # Original: mcpuser
  SPRING_DATASOURCE_USERNAME: bWNwdXNlcg==
  # Original: mcppassword
  SPRING_DATASOURCE_PASSWORD: bWNwcGFzc3dvcmQ=
  
  # MySQL root password (for MySQL StatefulSet)
  # Original: rootpassword
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk
  
  # AES-256 master key for encryption (32 bytes, base64 encoded)
  # Original: 0123456789abcdef0123456789abcdef (32 chars)
  AES_MASTER_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  
  # JWT signing secret (base64 encoded)
  # Original: mcp-gateway-jwt-secret-key-for-signing-tokens-2024
  JWT_SECRET: bWNwLWdhdGV3YXktand0LXNlY3JldC1rZXktZm9yLXNpZ25pbmctdG9rZW5zLTIwMjQ=

---
# ServiceAccount for the application
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-gateway-sa
  namespace: mcp-gateway
  labels:
    app: mcp-gateway


# =============================================================================
# Prometheus Configuration for MCP Gateway
# =============================================================================
# This file configures Prometheus to scrape metrics from the MCP Gateway
# backend application and other services.
# =============================================================================

global:
  scrape_interval: 15s          # How often to scrape targets
  evaluation_interval: 15s      # How often to evaluate rules
  scrape_timeout: 10s           # Timeout for scraping

  # Attach labels to any time series or alerts
  external_labels:
    monitor: 'mcp-gateway-monitor'
    environment: 'development'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093  # Uncomment if using Alertmanager

# Rule files for recording rules and alerts
rule_files:
  # - "alert_rules.yml"
  # - "recording_rules.yml"

# Scrape configurations
scrape_configs:
  # ==========================================================================
  # Prometheus self-monitoring
  # ==========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ==========================================================================
  # MCP Gateway Backend Application
  # ==========================================================================
  - job_name: 'mcp-gateway-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: 'mcp-gateway'
          service: 'backend'
    # For Docker Compose, use service name 'backend'
    # For standalone, use 'localhost:8080' or actual host

  # ==========================================================================
  # MySQL Metrics (requires mysqld_exporter)
  # ==========================================================================
  # Uncomment if using mysqld_exporter
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']
  #       labels:
  #         service: 'mysql'

  # ==========================================================================
  # Redis Metrics (requires redis_exporter)
  # ==========================================================================
  # Uncomment if using redis_exporter with full profile
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'redis'

  # ==========================================================================
  # Docker containers (requires cAdvisor)
  # ==========================================================================
  # Uncomment if using cAdvisor for container metrics
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # ==========================================================================
  # Node metrics (requires node_exporter)
  # ==========================================================================
  # Uncomment if using node_exporter for host metrics
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

# =============================================================================
# Key Metrics to Monitor
# =============================================================================
# 
# Application Metrics (from Spring Boot Actuator):
#   - jvm_memory_used_bytes         : JVM memory usage
#   - jvm_threads_live_threads      : Number of live threads
#   - http_server_requests_seconds  : HTTP request latency
#   - hikaricp_connections_active   : Active database connections
#
# Custom MCP Gateway Metrics:
#   - mcp_tool_calls_total          : Total tool calls (with tool, status labels)
#   - mcp_proxy_requests_total      : Proxy requests to MCP servers
#
# Resilience4j Metrics:
#   - resilience4j_circuitbreaker_state           : Circuit breaker state
#   - resilience4j_circuitbreaker_calls_total     : Calls through circuit breaker
#   - resilience4j_retry_calls_total              : Retry attempts
#   - resilience4j_ratelimiter_available_permissions : Rate limiter capacity
#
# =============================================================================
# Example Prometheus Queries (PromQL)
# =============================================================================
#
# Success rate of tool calls:
#   sum(rate(mcp_tool_calls_total{status="SUCCESS"}[5m])) / 
#   sum(rate(mcp_tool_calls_total[5m])) * 100
#
# Average response time:
#   rate(http_server_requests_seconds_sum[5m]) / 
#   rate(http_server_requests_seconds_count[5m])
#
# Circuit breaker open:
#   resilience4j_circuitbreaker_state{state="open"} == 1
#
# Rate of rate-limited requests:
#   rate(mcp_tool_calls_total{status="RATE_LIMITED"}[5m])
#
# =============================================================================

